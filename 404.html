  <link rel="stylesheet" href="styles.css">
  <style>
    .error-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px;
      text-align: center;
      border-bottom: 1px solid var(--rule);
    }
    .error-num {
      font-family: var(--font-head);
      font-size: clamp(100px, 20vw, 200px);
      font-weight: 800;
      letter-spacing: -0.05em;
      line-height: 1;
      color: var(--rule);
      margin-bottom: 8px;
    }
    .error-label {
      font-family: var(--font-body);
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 32px;
    }
    .error-msg {
      font-family: var(--font-head);
      font-size: clamp(18px, 2.5vw, 28px);
      font-weight: 800;
      letter-spacing: -0.02em;
      color: var(--ink);
      margin-bottom: 16px;
    }
    .error-sub {
      font-family: var(--font-body);
      font-size: 14px;
      color: var(--muted);
      max-width: 360px;
      line-height: 1.7;
      margin-bottom: 40px;
    }
    .error-links {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }
  </style>
</head>
